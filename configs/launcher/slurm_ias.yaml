# @package _global_
defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  mode: MULTIRUN  # needed for launcher to be used
  launcher:
    # launcher/cluster specific options
    timeout_min: 1440  # 24 hours
    gres: gpu:1  # we want all GPUs in a node
    mem_per_cpu: 2500  # in MB (* 8 cores in use = 120GB)
    partition: stud
    additional_parameters:
      cpus_per_task: 4
  #  nodes: 1
    # exclude: dgx-station,cn[01-14]  # e.g. do not allocate on these nodes because the RTX2080 doesn't have enough VRAM
  job_logging:
    root:
      handlers: [file]

